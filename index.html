<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BEST COLLECTOR</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme: #3b82f6;
            --theme-glow: rgba(59,130,246,0.4);
            --bg: #050810;
            --surface: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.07);
            --text: #e2e8f0;
            --muted: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% 0%, var(--theme-glow) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            transition: background 0.6s;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 60px 60px; }
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--theme), transparent);
            transition: background 0.6s;
        }

        .header-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(28px, 5vw, 42px);
            letter-spacing: 4px;
            line-height: 1;
        }

        .header-title span {
            color: var(--theme);
            transition: color 0.5s;
            text-shadow: 0 0 30px var(--theme);
        }

        .header-sub {
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .balance-box {
            text-align: right;
        }

        .balance-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .balance-amount {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 700;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251,191,36,0.5);
            transition: all 0.3s;
        }

        .balance-amount.bump {
            animation: bump 0.3s ease;
        }

        @keyframes bump {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* CASE / REEL */
        .case-wrap {
            position: relative;
            width: 100%;
            max-width: 820px;
            height: 170px;
            margin: 0 auto 24px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .case-wrap::before,
        .case-wrap::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            width: 120px;
            z-index: 10;
            pointer-events: none;
        }

        .case-wrap::before {
            left: 0;
            background: linear-gradient(90deg, rgba(5,8,16,0.95), transparent);
        }

        .case-wrap::after {
            right: 0;
            background: linear-gradient(-90deg, rgba(5,8,16,0.95), transparent);
        }

        .case-marker {
            position: absolute;
            left: 50%;
            top: 0; bottom: 0;
            width: 3px;
            background: var(--theme);
            z-index: 20;
            transform: translateX(-50%);
            box-shadow: 0 0 16px var(--theme), 0 0 40px var(--theme-glow);
            pointer-events: none;
        }

        .case-marker::before,
        .case-marker::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
        }

        .case-marker::before {
            top: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 10px solid var(--theme);
        }

        .case-marker::after {
            bottom: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 10px solid var(--theme);
        }

        .case-reel {
            display: flex;
            position: absolute;
            left: 0; top: 0; bottom: 0;
            align-items: center;
            transition: transform 5s cubic-bezier(0.12, 0, 0.04, 1);
        }

        .item-card {
            min-width: 140px;
            width: 140px;
            height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 8px;
            border-right: 1px solid rgba(255,255,255,0.04);
            text-align: center;
            border-radius: 4px;
            position: relative;
        }

        .item-card .item-icon { font-size: 42px; line-height: 1; margin-bottom: 8px; }
        .item-card .item-name { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.7); line-height: 1.3; }

        .rarity-comun { border-top: 3px solid #64748b; }
        .rarity-especial { border-top: 3px solid #3b82f6; }
        .rarity-epico { border-top: 3px solid #a855f7; background: radial-gradient(circle at 50% 0%, rgba(168,85,247,0.08), transparent 70%); }
        .rarity-legendario { border-top: 3px solid #f43f5e; background: radial-gradient(circle at 50% 0%, rgba(244,63,94,0.1), transparent 70%); }
        .rarity-mitico {
            border-top: 3px solid #fbbf24;
            background: radial-gradient(circle at 50% 0%, rgba(251,191,36,0.15), transparent 70%);
            animation: mythicPulse 2s infinite;
        }

        @keyframes mythicPulse {
            0%, 100% { box-shadow: inset 0 0 20px rgba(251,191,36,0.05); }
            50% { box-shadow: inset 0 0 40px rgba(251,191,36,0.15); }
        }

        .spin-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .spin-btn {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 6px;
            padding: 18px 64px;
            background: var(--theme);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 0 30px var(--theme-glow), 0 8px 32px rgba(0,0,0,0.4);
        }

        .spin-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .spin-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -120%;
            width: 60%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s;
        }

        .spin-btn:hover::after { left: 160%; }
        .spin-btn:hover { transform: translateY(-3px); box-shadow: 0 0 50px var(--theme-glow), 0 16px 40px rgba(0,0,0,0.5); }
        .spin-btn:active { transform: scale(0.97); }
        .spin-btn:disabled { opacity: 0.4; pointer-events: none; filter: grayscale(0.5); }

        .case-wrap.spinning { box-shadow: 0 0 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05), 0 0 30px var(--theme-glow); }

        @media (max-width: 700px) {
            .wrapper { padding: 12px 10px 60px; }
            header { flex-direction: column; align-items: stretch; gap: 12px; padding: 14px 16px; }
            .header-title { font-size: 26px; }
            .balance-box { text-align: center; }
            .case-wrap { height: 130px; }
            .item-card { min-width: 100px; width: 100px; }
            .item-card .item-icon { font-size: 28px; }
            .item-card .item-name { font-size: 7px; }
            .spin-btn { font-size: 18px; padding: 14px 40px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- HEADER -->
        <header>
            <div>
                <div class="header-title">THE <span>BEST</span> COLLECTOR</div>
                <div class="header-sub">RULETA JACKPOT</div>
            </div>
            <div class="balance-box">
                <div class="balance-label">BALANCE</div>
                <div class="balance-amount" id="balance">1000</div>
            </div>
        </header>

        <!-- REEL -->
        <div class="case-wrap" id="caseWrap">
            <div class="case-marker"></div>
            <div class="case-reel" id="caseReel"></div>
        </div>

        <!-- SPIN BUTTON -->
        <div class="spin-wrap">
            <button class="spin-btn" id="spinBtn">GIRAR</button>
        </div>
    </div>

    <script>
        // ITEMS DISPONIBLES
        const ITEMS = [
            { name: 'Bitcoin', icon: '₿', rarity: 'mitico', price: 500 },
            { name: 'Oro', icon: '💰', rarity: 'legendario', price: 300 },
            { name: 'Diamante', icon: '💎', rarity: 'epico', price: 200 },
            { name: 'Gema', icon: '✨', rarity: 'especial', price: 100 },
            { name: 'Moneda', icon: '🪙', rarity: 'comun', price: 50 },
            { name: 'Perla', icon: '🔮', rarity: 'epico', price: 180 },
            { name: 'Rubí', icon: '❤️', rarity: 'legendario', price: 350 },
            { name: 'Esmeralda', icon: '💚', rarity: 'legendario', price: 320 },
        ];

        const SPIN_COST = 100;
        const SPIN_DURATION = 5000; // 5 segundos

        let isSpinning = false;
        let balance = parseInt(localStorage.getItem('balance') || '1000');

        // Inicializar reel
        function initReel() {
            const reel = document.getElementById('caseReel');
            reel.innerHTML = '';
            
            // Crear 20 items para que sea suficiente
            for (let i = 0; i < 20; i++) {
                const item = ITEMS[i % ITEMS.length];
                const card = createItemCard(item);
                reel.appendChild(card);
            }
        }

        function createItemCard(item) {
            const card = document.createElement('div');
            card.className = `item-card rarity-${item.rarity}`;
            card.innerHTML = `
                <div class="item-icon">${item.icon}</div>
                <div class="item-name">${item.name}</div>
            `;
            return card;
        }

        function updateBalance(amount) {
            balance = amount;
            localStorage.setItem('balance', balance);
            const balanceEl = document.getElementById('balance');
            balanceEl.textContent = balance;
            balanceEl.classList.add('bump');
            setTimeout(() => balanceEl.classList.remove('bump'), 300);
        }

        function spin() {
            if (isSpinning || balance < SPIN_COST) return;

            isSpinning = true;
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true;

            // Deducir costo
            updateBalance(balance - SPIN_COST);

            // Elegir ganador aleatorio
            const winnerIndex = Math.floor(Math.random() * ITEMS.length);
            const winner = ITEMS[winnerIndex];

            // Calcular distancia para animar
            const itemWidth = 140;
            const distance = (winnerIndex * itemWidth) + (itemWidth / 2);
            const finalTransform = `translateX(-${distance}px)`;

            const reel = document.getElementById('caseReel');
            const caseWrap = document.getElementById('caseWrap');

            caseWrap.classList.add('spinning');
            reel.style.transition = 'none';
            reel.style.transform = 'translateX(0)';
            
            // Forzar reflow
            void reel.offsetHeight;

            reel.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.12, 0, 0.04, 1)`;
            reel.style.transform = finalTransform;

            setTimeout(() => {
                caseWrap.classList.remove('spinning');
                isSpinning = false;
                spinBtn.disabled = false;

                // Mostrar premio
                const newBalance = balance + winner.price;
                updateBalance(newBalance);

                // Confetti
                if (winner.rarity === 'mitico' || winner.rarity === 'legendario') {
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 }
                    });
                }

                alert(`¡Ganaste: ${winner.name}!\n💵 +${winner.price}`);
            }, SPIN_DURATION);
        }

        // Event Listeners
        document.getElementById('spinBtn').addEventListener('click', spin);

        // Inicializar
        initReel();
        document.getElementById('balance').textContent = balance;
    </script>
</body>
</html>
